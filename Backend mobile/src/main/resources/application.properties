spring.application.name=SmartStock
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:4000/proyect_smartstock
spring.datasource.username=root
spring.datasource.password=secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=15MB

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# JWT
app.jwt.secret=SmartStockMobileJwtSecretKeyChangeInProduction123456
app.jwt.issuer=smartstock-mobile
app.jwt.audience=smartstock-mobile-client
app.jwt.expiration-minutes=720
app.storage.endpoint=${APP_STORAGE_ENDPOINT:http://localhost:9000}
app.storage.region=${APP_STORAGE_REGION:us-east-1}
app.storage.access-key=${APP_STORAGE_ACCESS_KEY:rustfsadmin}
app.storage.secret-key=${APP_STORAGE_SECRET_KEY:rustfsadmin}
app.storage.bucket=${APP_STORAGE_BUCKET:reportes-evidencia}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:http://localhost:9000}
app.storage.auto-create-bucket=${APP_STORAGE_AUTO_CREATE_BUCKET:true}
app.storage.path-style-access-enabled=${APP_STORAGE_PATH_STYLE_ACCESS_ENABLED:true}
